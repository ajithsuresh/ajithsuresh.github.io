name: Update citation count

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch citation count via SerpAPI and patch portfolio.html
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import re, datetime, sys, os
          from scholarly import scholarly, ProxyGenerator

          AUTHOR_ID = 'uXP9hiMAAAAJ'
          serpapi_key = os.environ.get('SERPAPI_KEY', '')

          if not serpapi_key:
              print('SERPAPI_KEY secret not set — cannot fetch citations.')
              sys.exit(1)

          print('Fetching via SerpAPI...')
          try:
              pg = ProxyGenerator()
              pg.SerpAPI(serpapi_key)
              scholarly.use_proxy(pg)

              author = scholarly.search_author_id(AUTHOR_ID)
              count  = author.get('citedby', None)
          except Exception as e:
              print(f'SerpAPI fetch failed: {e}')
              sys.exit(1)

          if count is None:
              print('citedby field missing in response — skipping update')
              sys.exit(1)

          month_year = datetime.datetime.utcnow().strftime('%b %Y')
          print(f'Google Scholar citations: {count:,}  ({month_year})')

          with open('portfolio.html', 'r', encoding='utf-8') as f:
              html = f.read()

          html = re.sub(
              r'(href="https://scholar\.google\.com[^"]*"[^>]*>[\s\S]*?'
              r'<span class="pf-stat-num">)[\d,]+(</span>)',
              rf'\g<1>{count:,}\2',
              html,
              flags=re.DOTALL
          )
          html = re.sub(
              r'(Scholar, )[A-Za-z]+ \d{4}',
              rf'\g<1>{month_year}',
              html
          )

          with open('portfolio.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print('portfolio.html patched')
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet portfolio.html; then
            echo "Citation count unchanged — nothing to commit"
          else
            git add portfolio.html
            git commit -m "Update citation count [skip ci]"
            git push
          fi
