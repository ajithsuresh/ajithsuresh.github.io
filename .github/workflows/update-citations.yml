name: Update citation count

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5      # kill the whole job if it takes more than 5 minutes
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install scholarly requests

      - name: Fetch citation count from Google Scholar and patch portfolio.html
        timeout-minutes: 3  # kill this step after 3 minutes
        run: |
          python3 << 'PYEOF'
          import re, datetime, sys, signal, threading
          from scholarly import scholarly

          AUTHOR_ID = 'uXP9hiMAAAAJ'
          TIMEOUT_SECS = 60   # give each attempt at most 60 seconds

          def _fetch_with_timeout(fn, timeout=TIMEOUT_SECS):
              """Run *fn* in a thread; return its result or None on timeout."""
              result = [None]
              exc    = [None]
              def run():
                  try:
                      result[0] = fn()
                  except Exception as e:
                      exc[0] = e
              t = threading.Thread(target=run, daemon=True)
              t.start()
              t.join(timeout)
              if t.is_alive():
                  raise TimeoutError(f'timed out after {timeout}s')
              if exc[0]:
                  raise exc[0]
              return result[0]

          count = None

          # ── Attempt 1: direct (no proxy) ─────────────────────────────────
          print('Attempt 1: direct fetch (60 s timeout)...')
          try:
              author = _fetch_with_timeout(
                  lambda: scholarly.search_author_id(AUTHOR_ID)
              )
              count = author.get('citedby') if author else None
              if count is not None:
                  print(f'Direct fetch succeeded: {count:,}')
          except Exception as e:
              print(f'Direct fetch failed: {e}')

          # ── All attempts exhausted ────────────────────────────────────────
          if count is None:
              print('Fetch failed — Google is blocking the request from this IP.')
              print('Re-trigger manually from the Actions tab, or update the count by hand.')
              sys.exit(1)

          month_year = datetime.datetime.utcnow().strftime('%b %Y')
          print(f'Google Scholar citations: {count:,}  ({month_year})')

          with open('portfolio.html', 'r', encoding='utf-8') as f:
              html = f.read()

          html = re.sub(
              r'(href="https://scholar\.google\.com[^"]*"[^>]*>[\s\S]*?'
              r'<span class="pf-stat-num">)[\d,]+(</span>)',
              rf'\g<1>{count:,}\2',
              html,
              flags=re.DOTALL
          )
          html = re.sub(
              r'(Scholar, )[A-Za-z]+ \d{4}',
              rf'\g<1>{month_year}',
              html
          )

          with open('portfolio.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print('portfolio.html patched')
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet portfolio.html; then
            echo "Citation count unchanged — nothing to commit"
          else
            git add portfolio.html
            git commit -m "Update citation count [skip ci]"
            git push
          fi
