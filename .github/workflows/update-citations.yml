name: Update citation count

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install scholarly requests

      - name: Fetch citation count from Google Scholar and patch portfolio.html
        run: |
          python3 << 'PYEOF'
          import re, datetime, sys, time
          from scholarly import scholarly, ProxyGenerator

          AUTHOR_ID = 'uXP9hiMAAAAJ'
          count = None

          # ── Attempt 1: direct (no proxy) ──────────────────────────────────
          print('Attempt 1: direct fetch...')
          try:
              author = scholarly.search_author_id(AUTHOR_ID)
              count = author.get('citedby', None)
              if count is not None:
                  print(f'Direct fetch succeeded: {count:,}')
          except Exception as e:
              print(f'Direct fetch failed: {e}')

          # ── Attempt 2: free proxies ────────────────────────────────────────
          if count is None:
              print('Attempt 2: retrying with free proxies...')
              try:
                  pg = ProxyGenerator()
                  pg.FreeProxies()
                  scholarly.use_proxy(pg)
                  time.sleep(3)
                  author = scholarly.search_author_id(AUTHOR_ID)
                  count = author.get('citedby', None)
                  if count is not None:
                      print(f'Proxy fetch succeeded: {count:,}')
              except Exception as e:
                  print(f'Proxy fetch failed: {e}')

          # ── All attempts exhausted ─────────────────────────────────────────
          if count is None:
              print('All fetch attempts failed — Google is likely blocking the request.')
              print('Re-trigger manually from the Actions tab, or update the count by hand.')
              sys.exit(1)   # fail visibly so the Actions tab shows a red x

          month_year = datetime.datetime.utcnow().strftime('%b %Y')
          print(f'Google Scholar citations: {count:,}  ({month_year})')

          with open('portfolio.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # Replace the number inside the Scholar anchor block
          html = re.sub(
              r'(href="https://scholar\.google\.com[^"]*"[^>]*>[\s\S]*?'
              r'<span class="pf-stat-num">)[\d,]+(</span>)',
              rf'\g<1>{count:,}\2',
              html,
              flags=re.DOTALL
          )

          # Replace the date stamp "(Scholar, Mon YYYY)"
          html = re.sub(
              r'(Scholar, )[A-Za-z]+ \d{4}',
              rf'\g<1>{month_year}',
              html
          )

          with open('portfolio.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print('portfolio.html patched')
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet portfolio.html; then
            echo "Citation count unchanged — nothing to commit"
          else
            git add portfolio.html
            git commit -m "Update citation count [skip ci]"
            git push
          fi
